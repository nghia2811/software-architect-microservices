name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────
  # BUILD & PUSH IMAGES
  # ──────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Order Service ──
      - name: Build & push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/order-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/order-service:latest
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,mode=max,scope=order-service

      # ── Notification Service ──
      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/notification-service:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/notification-service:latest
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service

      # ── Frontend (NEXT_PUBLIC vars baked at build time) ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          build-args: |
            NEXT_PUBLIC_ORDER_URL=https://api.elementor.it.com
            NEXT_PUBLIC_NOTIF_URL=https://notifications.elementor.it.com
            NEXT_PUBLIC_WS_URL=wss://notifications.elementor.it.com/ws
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ──────────────────────────────────────────────
  # DEPLOY TO VPS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout (for compose files)
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.yaml,docker-compose.prod.yml,deploy.sh"
          target: "/opt/microservices"

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/microservices
            chmod +x deploy.sh
            REGISTRY=${{ env.REGISTRY }} \
            IMAGE_TAG=${{ env.IMAGE_TAG }} \
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            GHCR_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            GHCR_USER=${{ github.actor }} \
            bash deploy.sh
